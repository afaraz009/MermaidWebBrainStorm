<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spike 5 — Layout parity experiments</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 36px 1fr;
      height: 100vh;
      font-family: sans-serif;
      background: #f0f0f0;
      gap: 2px;
    }
    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      background: #e0e0e0;
      font-size: 13px;
    }
    .toolbar label { font-weight: 600; color: #333; }
    .toolbar select {
      padding: 4px 8px;
      font-size: 13px;
      border: 1px solid #888;
      border-radius: 3px;
      background: white;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label for="fixture-select">Fixture:</label>
    <select id="fixture-select">
      <option value="fixture.mmd">small</option>
      <option value="fixture200.mmd">200-node</option>
      <option value="fixture_shapes.mmd">shape gallery</option>
      <option value="fixture_nested.mmd">deep nesting (4 levels)</option>
      <option value="fixture_crosscluster.mmd">cross-cluster edge labels</option>
      <option value="fixture_crosscluster_acyclic.mmd">cross-cluster acyclic (control)</option>
    </select>
    <span style="margin-left:auto;color:#666;">left: Mermaid reference &nbsp;|&nbsp; right: A* renderer (drag a node)</span>
  </div>
  <iframe id="left"  src="mermaid-reference.html?fixture=fixture.mmd"></iframe>
  <iframe id="right" src="our-renderer.html?fixture=fixture.mmd"></iframe>

  <script>
    const sel = document.getElementById('fixture-select');
    const left = document.getElementById('left');
    const right = document.getElementById('right');
    sel.addEventListener('change', () => {
      const f = sel.value;
      left.src  = 'mermaid-reference.html?fixture=' + f;
      right.src = 'our-renderer.html?fixture=' + f;
    });
  </script>
</body>
</html>
