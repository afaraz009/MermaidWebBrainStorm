<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MermaidWeb spike — side-by-side</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; background: #eef0f2; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 28px 1fr; gap: 8px; height: 100vh; padding: 8px; box-sizing: border-box; }
    .label { font-size: 13px; font-weight: 600; color: #333; display: flex; align-items: center; padding: 0 6px; }
    iframe { width: 100%; height: 100%; border: 1px solid #bbb; border-radius: 4px; background: #fff; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="label">Mermaid (target)</div>
    <div class="label">Custom static</div>
    <div class="label">Custom interactive</div>
    <iframe src="./mermaid-reference.html"></iframe>
    <iframe src="./our-renderer.html"></iframe>
    <iframe src="./our-renderer-interactive.html"></iframe>
  </div>
</body>
</html>
