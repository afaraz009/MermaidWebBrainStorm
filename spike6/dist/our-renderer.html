<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Renderer (Spike 5 — Layout parity experiments)</title>
  <style>
    body { margin: 0; padding: 16px; font-family: sans-serif; background: #fff; }
    h2 { margin: 0 0 8px; font-size: 14px; color: #666; }
    .controls { margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn {
      padding: 6px 14px;
      font-size: 13px;
      border: 1px solid #4a6cf7;
      border-radius: 4px;
      background: white;
      color: #4a6cf7;
      cursor: pointer;
    }
    .btn:hover { background: #4a6cf7; color: white; }
    .btn.on { background: #4a6cf7; color: white; }
    .panel {
      display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
      margin-bottom: 12px; padding: 10px 12px;
      background: #fafbfd; border: 1px solid #e2e6ee; border-radius: 6px;
      font-size: 12px; color: #1a2942;
    }
    .panel label { display: inline-flex; gap: 6px; align-items: center; }
    .panel select { font: inherit; padding: 2px 6px; border-radius: 4px; border: 1px solid #c3cad8; background: white; }
    .panel input[type=range] { width: 120px; vertical-align: middle; }
    .panel .val { color: #4a6cf7; font-variant-numeric: tabular-nums; min-width: 26px; display: inline-block; text-align: right; }
    .legend { display: inline-flex; gap: 10px; align-items: center; margin-left: auto; font-size: 11px; color: #5a6478; }
    .legend .sw { display: inline-block; width: 11px; height: 11px; border: 1px solid rgba(0,0,0,0.15); vertical-align: middle; margin-right: 3px; }
    #mount { display: block; overflow: visible; }
    .sg-header:hover { fill: #1a1a2e; text-decoration: underline; }
    .subgraph-group:hover > rect { fill: #e8edff; fill-opacity: 0.4; stroke: #4a6cf7; }
    .subgraph-group:hover > .sg-header { fill: #1a1a2e; }
    [data-edge-key] { cursor: pointer; }
    [data-edge-key]:hover .edge-path { stroke: #4a6cf7; stroke-width: 2.5; }
    [data-edge-key]:hover .edge-arrow-line { stroke: #4a6cf7; stroke-width: 2.5; }
    g[data-node-id].connect-target > rect,
    g[data-subgraph-id].connect-target > rect {
      stroke: #10b981; stroke-width: 3; fill: rgba(16,185,129,0.15);
    }
    /* Disclosure overlay (focus + path modes). */
    .disclosure-dim { opacity: 0.1; transition: opacity 0.15s ease; }
    /* Accent stroke for active edges — applies to focus neighbours and path edges alike. */
    .disclosure-active .edge-path,
    .disclosure-active .edge-arrow-line { stroke: #4a6cf7; stroke-width: 2.5; }
    /* Active cluster waypoint: accent the container border (contents stay at
       normal visibility — tri-state "neutral"). */
    [data-subgraph-id].disclosure-active > rect { stroke: #4a6cf7; stroke-width: 2.5; }
    /* Transient "no path" cue (path mode): flash the clicked target red over the
       dim. Defined after .disclosure-dim so opacity:1 wins by source order. */
    .path-no-route { opacity: 1; }
    .path-no-route > rect,
    .path-no-route > circle,
    .path-no-route > ellipse,
    .path-no-route > polygon,
    .path-no-route > path { stroke: #e0395d; stroke-width: 3; transition: stroke 0.15s ease; }
  </style>
  <script type="module" crossorigin src="/assets/ourRenderer-MW6umDHl.js"></script>

  <link rel="modulepreload" crossorigin href="/assets/array-9GQRnUsD.js">
  <link rel="modulepreload" crossorigin href="/assets/line-bUome-pQ.js">
  <link rel="modulepreload" crossorigin href="/assets/isEmpty-BI2NhQVJ.js">
  <link rel="modulepreload" crossorigin href="/assets/_baseUniq-Dm6A69ym.js">
  <link rel="modulepreload" crossorigin href="/assets/graphlib-cnILPK_C.js">
  <link rel="modulepreload" crossorigin href="/assets/min-B9_uqKpX.js">

</head>
<body>
  <h2>Spike 5 — Layout parity experiments (sortNodesByHierarchy port + node→subgraph crash fix). All spike4 behaviour preserved.</h2>
  <div class="controls">
    <button id="reset" class="btn">Reset Layout</button>
    <button id="collapseAll" class="btn">Collapse All</button>
    <button id="expandAll" class="btn">Expand All</button>
    <button id="toggleFocus" class="btn">Focus</button>
    <button id="togglePath" class="btn">Path</button>
    <button id="toggleGrid" class="btn">Show A* Grid</button>
    <button id="toggleAstar" class="btn">Show A* Feature</button>
    <button id="toggleSeparation" class="btn">Separation: Off</button>
    <button id="toggleEdgeMode" class="btn">Edges: Side-aware</button>
  </div>
  <div class="panel" id="depthPanel">
    <label>Depth
      <input type="range" id="cfgDepth" min="0" max="1" value="1" step="1">
      <span class="val" id="cfgDepthVal">1</span>
    </label>
    <span class="legend" style="margin-left:0;">show down to depth N, collapse deeper</span>
  </div>
  <div class="panel" id="astarPanel">
    <label>Cell size
      <input type="range" id="cfgCellSize" min="6" max="30" value="10" step="1">
      <span class="val" id="cfgCellSizeVal">10</span>px
    </label>
    <label>Connectivity
      <select id="cfgConnectivity">
        <option value="4" selected>4-way</option>
        <option value="8">8-way</option>
      </select>
    </label>
    <label>Corner cutting
      <select id="cfgCornerCut">
        <option value="0" selected>Blocked</option>
        <option value="1">Allowed</option>
      </select>
    </label>
    <label>Heuristic
      <select id="cfgHeuristic">
        <option value="manhattan" selected>Manhattan</option>
        <option value="octile">Octile</option>
        <option value="euclidean">Euclidean</option>
        <option value="chebyshev">Chebyshev</option>
        <option value="zero">Zero (Dijkstra)</option>
      </select>
    </label>
    <span class="legend">
      <span><span class="sw" style="background:#e0395d"></span>obstacle</span>
      <span><span class="sw" style="background:#9ab3e6"></span>closed</span>
      <span><span class="sw" style="background:#2ec27e"></span>open</span>
    </span>
  </div>
  <svg id="mount" xmlns="http://www.w3.org/2000/svg"></svg>
</body>
</html>
