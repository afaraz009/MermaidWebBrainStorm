<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spike 2 — side-by-side</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; background: #eef0f2; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #fff; border-bottom: 1px solid #ccd; }
    .toolbar label { font-size: 13px; color: #333; }
    .toolbar select { font: inherit; padding: 4px 8px; border: 1px solid #aab; border-radius: 4px; background: #fafafa; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 28px 1fr; gap: 8px; height: calc(100vh - 45px); padding: 8px; box-sizing: border-box; }
    .label { font-size: 13px; font-weight: 600; color: #333; display: flex; align-items: center; padding: 0 6px; }
    iframe { width: 100%; height: 100%; border: 1px solid #bbb; border-radius: 4px; background: #fff; }
  </style>
</head>
<body>
  <div class="toolbar">
    <label for="fixture-picker">Fixture:</label>
    <select id="fixture-picker">
      <option value="fixture.mmd">fixture.mmd — small architecture (≈11 nodes)</option>
      <option value="fixture-200.mmd">fixture-200.mmd — service mesh (≈200 nodes)</option>
    </select>
  </div>
  <div class="grid">
    <div class="label">Mermaid (reference)</div>
    <div class="label">Custom renderer + A* on drop</div>
    <iframe id="ref"></iframe>
    <iframe id="ours"></iframe>
  </div>
  <script>
    const picker = document.getElementById('fixture-picker');
    const ref = document.getElementById('ref');
    const ours = document.getElementById('ours');

    const initial = new URLSearchParams(location.search).get('fixture') ?? 'fixture.mmd';
    picker.value = initial;

    const apply = (fixture) => {
      const q = `?fixture=${encodeURIComponent(fixture)}`;
      ref.src = `./mermaid-reference.html${q}`;
      ours.src = `./our-renderer.html${q}`;
      const url = new URL(location.href);
      url.searchParams.set('fixture', fixture);
      history.replaceState(null, '', url.toString());
    };

    picker.addEventListener('change', () => apply(picker.value));
    apply(initial);
  </script>
</body>
</html>
